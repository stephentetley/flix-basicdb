[package]
name        = "flix-basicdb"
description = "A basic effect-based database interface for Flix using JDBC."
version     = "0.7.0"
flix        = "0.67.0"
license     = "Apache-2.0"
authors     = ["Stephen Tetley <stephen.tetley@gmail.com>"]

[dependencies]
"github:stephentetley/charset-locale" = { version = "0.10.0", security = "unrestricted" }
"github:stephentetley/flix-time"= { version = "0.15.1",  security = "unrestricted" }


[mvn-dependencies]
"org.duckdb:duckdb_jdbc" = "1.4.2.0"
"org.xerial:sqlite-jdbc" = "3.50.3.0"
